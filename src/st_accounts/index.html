<!DOCTYPE html>
<html>
<head>
    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <title> STUDENT ACCOUNTS MANAGEMENT SYSTEM</title>
</head>
<body>
<h1>Hello Students !!</h1>
<form action="#" method="post">
    <label for="name">Full Name : </label>
    <input type="text" placeholder="Username" id="name" name="sname"  required >
    <i class="fa fa-user"></i>

    <br><br>
    <!-- Attribute	Used For
              id	Frontend (label, CSS, JS)
            name	Backend (form submission) -->
    <label for="ID">Redgestration Number : </label>
    <input type="number"  placeholder="Password"  id="ID" name="sid" required >
    <i class="fa fa-lock"></i>
    <br>


</form>
</body>
</html>
